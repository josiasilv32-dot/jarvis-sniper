name: Jarvis Sniper 24/7

on:
  schedule:
    - cron: '0 */1 * * *' # Roda 1x por hora. Não muda pra não estourar limite grátis
  workflow_dispatch: # Botão pra rodar manual

jobs:
  snipe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixa o código
        uses: actions/checkout@v4
      
      - name: Instala Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instala dependências
        run: |
          pip install playwright requests beautifulsoup4
          playwright install chromium
      
      - name: Roda Jarvis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python sniper.py
